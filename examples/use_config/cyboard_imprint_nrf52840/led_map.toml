map = [
    [3, 0],   #  0: G
    [2, 0],   #  1: B
    [5, 0],   #  2: 6
    [4, 0],   #  3: T
    [3, 1],   #  4: F
    [2, 1],   #  5: V
    [5, 1],   #  6: 5
    [4, 1],   #  7: R
    [3, 2],   #  8: D
    [2, 2],   #  9: C
    [1, 2],   # 10: Cmd
    [5, 2],   # 11: 4
    [4, 2],   # 12: E
    [3, 3],   # 13: S
    [2, 3],   # 14: X
    [1, 3],   # 15: Opt
    [5, 3],   # 16: 3
    [4, 3],   # 17: W
    [3, 4],   # 18: A
