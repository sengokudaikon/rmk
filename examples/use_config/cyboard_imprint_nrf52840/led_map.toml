[led_map]
chain_length = 32

[led_map.colors]
base   = [0, 1, 3]
layer1 = [1, 0, 3]
layer2 = [3, 1, 0]
caps   = [4, 0, 0]

# LED index → keymap (row, col). Auto-converted from led_map.md.
# Thumb entries (LED 26-31) are best-guess — verify visibly after flash.
